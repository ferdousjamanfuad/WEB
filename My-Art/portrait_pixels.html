<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuad-Portrait</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 10;
    animation: scanshift 8s linear infinite;
  }

  @keyframes scanshift {
    0%   { background-position: 0 0; }
    100% { background-position: 0 100px; }
  }

  #ui {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffe7;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.55;
    z-index: 20;
    text-align: center;
    user-select: none;
  }

  #ui span { color: #fff; opacity: 0.35; }

  #canvas-wrap {
    position: relative;
  }

  canvas {
    display: block;
    /* neon ambient glow on the whole canvas */
    filter: drop-shadow(0 0 18px rgba(0,255,200,0.18)) drop-shadow(0 0 6px rgba(120,200,255,0.25));
  }

  #status {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ffe760;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    z-index: 20;
    user-select: none;
  }
</style>
</head>

// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const CFG = {
  // Target canvas resolution (pixels drawn = COLS × ROWS)
  COLS: 120,
  ROWS: 140,
  // Each "LED pixel" size in screen px
  PIXEL_SIZE: 5,
  // Gap between LED pixels
  GAP: 1,
  // Glow radius multiplier
  GLOW: 10,
  // Brightness pulse speed (radians per frame)
  PULSE_SPEED: 0.018,
  // Pulse amplitude (0..1) — how much brightness oscillates
  PULSE_AMP: 0.12,
  // Flicker probability per pixel per frame
  FLICKER_CHANCE: 0.0008,
  // Flicker drop (0..1 brightness multiplier when flickering)
  FLICKER_DROP: 0.25,
  // Whether to draw the tiny dot in the center of each pixel
  DOT: true,
};

// ─────────────────────────────────────────────────────────────
// GLOBALS
// ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('pixelCanvas');
const ctx     = canvas.getContext('2d');
const status  = document.getElementById('status');
const srcImg  = document.getElementById('srcImg');

const CELL    = CFG.PIXEL_SIZE + CFG.GAP;
const W_PX    = CFG.COLS * CELL - CFG.GAP;
const H_PX    = CFG.ROWS * CELL - CFG.GAP;

canvas.width  = W_PX;
canvas.height = H_PX;

// Pixel data array: [{r,g,b,bright,flicker,phase}]
let pixels = [];
let frame  = 0;
let animId = null;

// ─────────────────────────────────────────────────────────────
// LOAD & SAMPLE IMAGE → extract greyscale per cell
// ─────────────────────────────────────────────────────────────
function loadAndSample() {
  status.textContent = 'LOADING IMAGE DATA…';

  // Off-screen canvas to read pixels
  const offCanvas = document.createElement('canvas');
  offCanvas.width  = CFG.COLS;
  offCanvas.height = CFG.ROWS;
  const offCtx = offCanvas.getContext('2d');

  srcImg.onload = () => {
    status.textContent = 'SAMPLING PIXEL MATRIX…';

    // Draw source image into the tiny offscreen canvas (preserves aspect ratio center-crop)
    const srcAspect = srcImg.naturalWidth / srcImg.naturalHeight;
    const dstAspect = CFG.COLS / CFG.ROWS;

    let sx = 0, sy = 0, sw = srcImg.naturalWidth, sh = srcImg.naturalHeight;
    if (srcAspect > dstAspect) {
      sw = srcImg.naturalHeight * dstAspect;
      sx = (srcImg.naturalWidth - sw) / 2;
    } else {
      sh = srcImg.naturalWidth / dstAspect;
      sy = (srcImg.naturalHeight - sh) / 2;
    }

    offCtx.drawImage(srcImg, sx, sy, sw, sh, 0, 0, CFG.COLS, CFG.ROWS);

    // Read RGBA data
    const imgData = offCtx.getImageData(0, 0, CFG.COLS, CFG.ROWS).data;

    pixels = [];
    for (let row = 0; row < CFG.ROWS; row++) {
      for (let col = 0; col < CFG.COLS; col++) {
        const idx = (row * CFG.COLS + col) * 4;
        const r = imgData[idx];
        const g = imgData[idx + 1];
        const b = imgData[idx + 2];

        // Perceived luminance (Rec.709)
        const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;

        // Slightly boost contrast / mid-range
        const bright = Math.pow(lum, 0.82);

        pixels.push({
          bright,                             // base brightness [0..1]
          flicker: 0,                         // live flicker multiplier
          phase: Math.random() * Math.PI * 2, // per-pixel pulse offset
        });
      }
    }

    status.textContent = 'RENDERING LED MATRIX…';
    setTimeout(() => {
      status.textContent = 'ONLINE ■ ' + CFG.COLS + '×' + CFG.ROWS + ' PIXELS';
    }, 1200);

    // Kick off animation
    if (animId) cancelAnimationFrame(animId);
    renderLoop();
  };

  srcImg.onerror = () => {
    status.textContent = 'ERROR: CANNOT DECODE IMAGE';
  };

  srcImg.src = 'data:image/jpeg;base64,' + BASE64_IMAGE;
}

// ─────────────────────────────────────────────────────────────
// DRAW ONE LED PIXEL
// ─────────────────────────────────────────────────────────────
function drawLedPixel(cx, cy, b) {
  // b = [0..1] final brightness

  if (b < 0.02) {
    // Nearly black — draw a very faint dead pixel
    ctx.fillStyle = 'rgba(0,18,12,0.5)';
    ctx.fillRect(cx, cy, CFG.PIXEL_SIZE, CFG.PIXEL_SIZE);
    return;
  }

  const sz = CFG.PIXEL_SIZE;

  // Map brightness to a cool white/cyan LED colour
  // low brightness → dim cyan-teal, high → bright blue-white
  const rC = Math.round(b * 210 + (1 - b) * 30);
  const gC = Math.round(b * 255 + (1 - b) * 200);
  const bC = Math.round(b * 255 + (1 - b) * 210);
  const alpha = 0.18 + b * 0.82;

  // ── GLOW halo (soft, radial-ish via shadow)
  const glowR = sz * 0.5 + b * CFG.GLOW;
  ctx.shadowColor  = `rgba(${rC},${gC},${bC},${b * 0.85})`;
  ctx.shadowBlur   = glowR;

  // ── Main pixel fill (slightly rounded feel via gradient)
  ctx.fillStyle = `rgba(${rC},${gC},${bC},${alpha})`;
  ctx.fillRect(cx, cy, sz, sz);

  // Reset shadow so it doesn't bleed into subsequent ops
  ctx.shadowBlur = 0;

  // ── Tiny bright specular dot in top-left for LED realism
  if (CFG.DOT && b > 0.12) {
    const dotR = Math.max(0.5, sz * 0.18);
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, b * 1.1)})`;
    ctx.beginPath();
    ctx.arc(cx + dotR + 0.5, cy + dotR + 0.5, dotR, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────
function renderLoop() {
  frame++;

  // Black background
  ctx.clearRect(0, 0, W_PX, H_PX);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W_PX, H_PX);

  for (let row = 0; row < CFG.ROWS; row++) {
    for (let col = 0; col < CFG.COLS; col++) {
      const pIdx = row * CFG.COLS + col;
      const p    = pixels[pIdx];

      // ── Pulse: per-pixel sine wave
      const pulse = 1 + Math.sin(frame * CFG.PULSE_SPEED + p.phase) * CFG.PULSE_AMP;

      // ── Flicker: random sharp dim
      if (Math.random() < CFG.FLICKER_CHANCE) {
        p.flicker = CFG.FLICKER_DROP;
      } else {
        // Recover quickly
        p.flicker = p.flicker < 1 ? p.flicker + 0.06 : 1;
      }

      // Combine
      let b = p.bright * pulse * p.flicker;
      b = Math.max(0, Math.min(1, b));

      const cx = col * CELL;
      const cy = row * CELL;
      drawLedPixel(cx, cy, b);
    }
  }

  animId = requestAnimationFrame(renderLoop);
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
loadAndSample();
</script>
