<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Center Flex</title>
    <style>
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgb(123, 64, 195);
            height: 600px;
        }

        .box {
            background-color: rgb(106, 228, 141);
            height: 100px;
            width: 100px;
            font-size: 3em;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">
            Box
        </div>
    </div>

</body>

</html>
