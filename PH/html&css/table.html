<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            border-collapse: collapse;
        }

        td,
        th {
            border: 1px solid black;
            padding: 10px 20px;
        }
    </style>
</head>

<body>
    <main>
        <h2>Table Info</h2>
        <table>
            <caption>Friends List</caption>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Name</th>
                    <th>Id</th>
                    <th>Age</th>
                </tr>

            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Fuad</td>
                    <td>24-56292-1</td>
                    <td>23</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>
                        Zihan
                    </td>
                    <td>24-56303-1</td>
                    <td>22</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td> Sadman </td>
                    <td>24-56301-1</td>
                    <td>22</td>
                </tr>
            </tbody>

            <tfoot>
                <tr>
                    <td colspan="4">Total = 3</td>
                </tr>
            </tfoot>

        </table>

    </main>
    <section>
        <header>
            <h2>Html Table Tags </h2>
        </header>
        <ul>
            <li>Table: Table</li>
            <li>Table head: Thead</li>
            <li>Table head data: Th</li>
            <li>Table body: Tbody</li>
            <li>Table foot:Tfoot</li>
            <li>Table row: Tr</li>
            <li>Table data: Td</li>
        </ul>
    </section>
</body>

</html>
