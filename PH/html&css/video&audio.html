<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video&Audio</title>
</head>

<body>
    <audio controls src="../files/audio/goat.mp3"></audio>
    <video controls width="400" height="250" src="../files/video/v1.mp4"></video>

    <!-- fallback mechanism(if one format doesnt work try next and if all failed then show the message) -->
    <video controls width="400" height="250">
        <source src="../files/video/v3.webm" type="video/webm">
        <source src="../files/video/v3.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>


    <!-- YouTube Video embedded code -->
    <iframe width="560" height="315" src="https://www.youtube.com/embed/yd1JhZzoS6A?si=d1Zu3QAfqvCTTYmh"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
